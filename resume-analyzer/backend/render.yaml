# Render production deployment configuration
# Drop this into the /backend root folder

services:
  - type: web
    name: resume-analyzer-api
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python -m spacy download en_core_web_sm
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: MONGODB_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_NAME
        value: resume_analyzer_db
      - key: SECRET_KEY
        generate_value: true
      - key: SPACY_MODEL
        value: en_core_web_sm
      - key: TRANSFORMER_MODEL
        value: all-MiniLM-L6-v2
